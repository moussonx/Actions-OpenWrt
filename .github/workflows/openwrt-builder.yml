name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  DEVICE_NAME: XGATE

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$USER /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Restore ccache
      uses: actions/cache/restore@v4
      with:
        path: openwrt/.ccache
        key: ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-

    - name: Restore dl
      uses: actions/cache/restore@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-

    - name: Load custom feeds
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
        echo "src-git lucky https://github.com/gdy666/luci-app-lucky.git" >> feeds.conf.default
        echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default
        git clone --depth=1 https://github.com/zzsj0928/luci-app-pushbot.git package/luci-app-pushbot
        
        # 🔧 [精准修复]: 彻底删除 pushbot 对不存在包 iputils-arping 的硬依赖
        sed -i 's/iputils-arping//g' package/luci-app-pushbot/Makefile
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        cat > .config <<EOF
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_DEVICE_generic=y
        CONFIG_TARGET_ROOTFS_PARTSIZE=1024
        # CONFIG_TARGET_ROOTFS_SQUASHFS is not set

        # --- 深度修复：剥离崩溃模块 ---
        # CONFIG_PACKAGE_qemu is not set
        # CONFIG_PACKAGE_fullconenat-nft is not set
        # CONFIG_PACKAGE_kmod-nft-fullcone is not set
        # -----------------------------

        CONFIG_DOCKER_CGROUP_OPTIONS=y
        CONFIG_DOCKER_NET_MACVLAN=y
        CONFIG_DOCKER_STO_EXT4=y
        CONFIG_KERNEL_CGROUP_DEVICE=y
        CONFIG_KERNEL_CGROUP_FREEZER=y
        CONFIG_KERNEL_CGROUP_NET_PRIO=y
        CONFIG_KERNEL_EXT4_FS_POSIX_ACL=y
        CONFIG_KERNEL_EXT4_FS_SECURITY=y
        CONFIG_KERNEL_FS_POSIX_ACL=y
        CONFIG_KERNEL_NET_CLS_CGROUP=y
        CONFIG_PARTED_READLINE=y
        CONFIG_PCRE2_JIT_ENABLED=y

        CONFIG_PACKAGE_containerd=y
        CONFIG_PACKAGE_docker=y
        CONFIG_PACKAGE_dockerd=y
        CONFIG_PACKAGE_runc=y
        CONFIG_PACKAGE_tini=y
        CONFIG_PACKAGE_luci-app-portainer=y
        CONFIG_PACKAGE_luci-i18n-portainer-zh-cn=y

        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-i18n-openclash-zh-cn=y
        CONFIG_PACKAGE_luci-app-mosdns=y
        CONFIG_PACKAGE_luci-i18n-mosdns-zh-cn=y
        CONFIG_PACKAGE_mosdns=y
        CONFIG_PACKAGE_v2ray-geoip=y
        CONFIG_PACKAGE_v2ray-geosite=y

        CONFIG_PACKAGE_luci-app-store=y
        CONFIG_PACKAGE_luci-i18n-store-zh-cn=y
        CONFIG_PACKAGE_luci-app-filebrowser=y
        CONFIG_PACKAGE_luci-i18n-filebrowser-zh-cn=y
        CONFIG_PACKAGE_luci-app-aria2=y
        CONFIG_PACKAGE_luci-i18n-aria2-zh-cn=y
        CONFIG_PACKAGE_luci-app-watchcat=y
        CONFIG_PACKAGE_luci-i18n-watchcat-zh-cn=y
        CONFIG_PACKAGE_luci-app-wol=y
        CONFIG_PACKAGE_luci-i18n-wol-zh-cn=y
        
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
        CONFIG_PACKAGE_miniupnpd=y

        CONFIG_PACKAGE_luci-app-diskman=y
        CONFIG_PACKAGE_luci-app-diskman_INCLUDE_lsblk=y
        CONFIG_PACKAGE_luci-i18n-diskman-zh-cn=y
        CONFIG_PACKAGE_luci-app-lucky=y
        CONFIG_PACKAGE_luci-i18n-lucky-zh-cn=y
        CONFIG_PACKAGE_luci-app-pushbot=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
        CONFIG_PACKAGE_luci-app-mwan3=y
        CONFIG_PACKAGE_luci-i18n-mwan3-zh-cn=y
        CONFIG_PACKAGE_luci-app-netdata=y
        CONFIG_PACKAGE_luci-i18n-netdata-zh-cn=y
        CONFIG_PACKAGE_luci-app-nlbwmon=y
        CONFIG_PACKAGE_luci-i18n-nlbwmon-zh-cn=y
        CONFIG_PACKAGE_luci-app-nut=y
        CONFIG_PACKAGE_luci-i18n-nut-zh-cn=y
        CONFIG_PACKAGE_luci-app-sqm=y
        CONFIG_PACKAGE_luci-i18n-sqm-zh-cn=y
        CONFIG_PACKAGE_luci-app-vlmcsd=y
        CONFIG_PACKAGE_luci-i18n-vlmcsd-zh-cn=y
        CONFIG_PACKAGE_luci-theme-argon=y
        
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y
        CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_SHORTCUT_FE=y
        
        CONFIG_PACKAGE_uhttpd=y
        CONFIG_PACKAGE_uhttpd-mod-ubus=y
        CONFIG_PACKAGE_luci-app-uhttpd=y
        CONFIG_PACKAGE_luci-light=y
        CONFIG_PACKAGE_luci-ssl=y

        CONFIG_PACKAGE_bash=y
        CONFIG_PACKAGE_blkid=y
        CONFIG_PACKAGE_btrfs-progs=y
        CONFIG_PACKAGE_ca-certificates=y
        CONFIG_PACKAGE_cgroupfs-mount=y
        CONFIG_PACKAGE_coreutils=y
        CONFIG_PACKAGE_coreutils-base64=y
        CONFIG_PACKAGE_coreutils-nohup=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_dosfstools=y
        CONFIG_PACKAGE_exfat-fsck=y
        CONFIG_PACKAGE_exfat-mkfs=y
        CONFIG_PACKAGE_ipv6helper=y
        CONFIG_PACKAGE_jq=y
        CONFIG_PACKAGE_lsblk=y
        CONFIG_PACKAGE_mount-utils=y
        CONFIG_PACKAGE_parted=y
        CONFIG_PACKAGE_qemu-ga=y
        CONFIG_PACKAGE_resolveip=y
        CONFIG_PACKAGE_tailscale=y
        CONFIG_PACKAGE_tcpdump=y
        CONFIG_PACKAGE_tcping=y
        CONFIG_PACKAGE_unzip=y
        CONFIG_PACKAGE_virtio-console-helper=y
        CONFIG_PACKAGE_xray-core=y
        
        CONFIG_PACKAGE_intel-microcode=y
        CONFIG_PACKAGE_iucode-tool=y

        CONFIG_PACKAGE_kmod-e1000e=y             
        CONFIG_PACKAGE_kmod-vmxnet3=y            
        CONFIG_PACKAGE_kmod-usb-net-rtl8152=y    
        CONFIG_PACKAGE_kmod-igc=y                
        CONFIG_PACKAGE_kmod-igb=y                
        CONFIG_PACKAGE_kmod-r8125=y              
        CONFIG_PACKAGE_kmod-r8126=y              
        CONFIG_PACKAGE_kmod-r8168=y              

        CONFIG_TARGET_ROOTFS_EXT4FS=y        
        CONFIG_TARGET_IMAGES_GZIP=y          
        CONFIG_EFI_IMAGES=y                  
        CONFIG_PACKAGE_kmod-virtio-net=y     
        CONFIG_PACKAGE_kmod-virtio-blk=y     
        CONFIG_PACKAGE_kmod-virtio-scsi=y    
        CONFIG_PACKAGE_kmod-virtio-balloon=y
        CONFIG_PACKAGE_kmod-virtio-rng=y

        CONFIG_PACKAGE_kmod-br-netfilter=y
        CONFIG_PACKAGE_kmod-crypto-acompress=y
        CONFIG_PACKAGE_kmod-crypto-blake2b=y
        CONFIG_PACKAGE_kmod-crypto-xxhash=y
        CONFIG_PACKAGE_kmod-dummy=y
        CONFIG_PACKAGE_kmod-fs-btrfs=y
        CONFIG_PACKAGE_kmod-fs-msdos=y
        CONFIG_PACKAGE_kmod-ifb=y
        CONFIG_PACKAGE_kmod-inet-diag=y
        CONFIG_PACKAGE_kmod-ip6tables=y
        CONFIG_PACKAGE_kmod-ipt-conntrack=y
        CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y
        CONFIG_PACKAGE_kmod-ipt-core=y
        CONFIG_PACKAGE_kmod-ipt-extra=y
        CONFIG_PACKAGE_kmod-ipt-ipopt=y
        CONFIG_PACKAGE_kmod-ipt-ipset=y
        CONFIG_PACKAGE_kmod-ipt-nat=y
        CONFIG_PACKAGE_kmod-ipt-nat6=y
        CONFIG_PACKAGE_kmod-ipt-physdev=y
        CONFIG_PACKAGE_kmod-iptunnel=y
        CONFIG_PACKAGE_kmod-iptunnel4=y
        CONFIG_PACKAGE_kmod-lib-lzo=y
        CONFIG_PACKAGE_kmod-lib-raid6=y
        CONFIG_PACKAGE_kmod-lib-xor=y
        CONFIG_PACKAGE_kmod-lib-xxhash=y
        CONFIG_PACKAGE_kmod-lib-zlib-deflate=y
        CONFIG_PACKAGE_kmod-lib-zlib-inflate=y
        CONFIG_PACKAGE_kmod-lib-zstd=y
        CONFIG_PACKAGE_kmod-netlink-diag=y
        CONFIG_PACKAGE_kmod-nf-conncount=y
        CONFIG_PACKAGE_kmod-nf-ipt=y
        CONFIG_PACKAGE_kmod-nf-ipt6=y
        CONFIG_PACKAGE_kmod-nf-ipvs=y
        CONFIG_PACKAGE_kmod-nf-nat6=y
        CONFIG_PACKAGE_kmod-nf-socket=y
        CONFIG_PACKAGE_kmod-nf-tproxy=y
        CONFIG_PACKAGE_kmod-nft-compat=y
        CONFIG_PACKAGE_kmod-nft-socket=y
        CONFIG_PACKAGE_kmod-nft-tproxy=y
        CONFIG_PACKAGE_kmod-nls-cp932=y
        CONFIG_PACKAGE_kmod-nls-cp936=y
        CONFIG_PACKAGE_kmod-nls-cp950=y
        CONFIG_PACKAGE_kmod-sched-cake=y
        CONFIG_PACKAGE_kmod-sched-core=y
        CONFIG_PACKAGE_kmod-sit=y
        CONFIG_PACKAGE_kmod-tcp-bbr=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-veth=y
        
        CONFIG_PACKAGE_libatomic=y
        CONFIG_PACKAGE_libattr=y
        CONFIG_PACKAGE_libbpf=y
        CONFIG_PACKAGE_libcap=y
        CONFIG_PACKAGE_libcap-ng=y
        CONFIG_PACKAGE_libcurl=y
        CONFIG_PACKAGE_libelf=y
        CONFIG_PACKAGE_libevdev=y
        CONFIG_PACKAGE_libffi=y
        CONFIG_PACKAGE_libipset=y
        CONFIG_PACKAGE_libiptext=y
        CONFIG_PACKAGE_libiptext-nft=y
        CONFIG_PACKAGE_libiptext6=y
        CONFIG_PACKAGE_libltdl=y
        CONFIG_PACKAGE_liblua5.3=y
        CONFIG_PACKAGE_liblzo=y
        CONFIG_PACKAGE_libmount=y
        CONFIG_PACKAGE_libnghttp2=y
        CONFIG_PACKAGE_libparted=y
        CONFIG_PACKAGE_libpcap=y
        CONFIG_PACKAGE_libpcre2=y
        CONFIG_PACKAGE_libreadline=y
        CONFIG_PACKAGE_libseccomp=y
        CONFIG_PACKAGE_libstdcpp=y
        CONFIG_PACKAGE_libuci-lua=y
        CONFIG_PACKAGE_libudev-zero=y
        CONFIG_PACKAGE_libuv=y
        CONFIG_PACKAGE_libwebsockets-full=y
        CONFIG_PACKAGE_libxtables=y

        CONFIG_SING_BOX_BUILD_ACME=y
        CONFIG_SING_BOX_BUILD_CLASH_API=y
        CONFIG_SING_BOX_BUILD_GVISOR=y
        CONFIG_SING_BOX_BUILD_QUIC=y
        CONFIG_SING_BOX_BUILD_TAILSCALE=y
        CONFIG_SING_BOX_BUILD_UTLS=y
        CONFIG_SING_BOX_BUILD_WIREGUARD=y
        EOF
        
        make defconfig
        echo "CONFIG_CCACHE=y" >> .config

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j8 2>&1 | tee download.log
        if grep -qi "failed\|error" download.log; then
          echo "检测到下载失败，正在使用单线程回退重试..."
          make download -j1
        fi
        find dl -size -1024c -exec rm -f {} \;

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: (failure() || cancelled()) && github.event.inputs.ssh == 'true'
      timeout-minutes: 60

    - name: Compile the firmware
      id: compile
      timeout-minutes: 360
      run: |
        cd openwrt
        export FORCE_UNSAFE_CONFIGURE=1
        set -o pipefail
        if ! make -j$(nproc); then
          echo "多线程编译失败，开始单线程生成详细排障日志并尝试恢复..."
          if ! make -j1 V=s 2>&1 | tee build.log; then
            echo "单线程编译也失败了，请前往 Artifacts 下载 build.log 查看详细错误。"
            exit 1
          else
            echo "单线程编译成功！刚才的多线程报错可能是竞态条件。"
          fi
        fi
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Upload Error Log
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: OpenWrt_Crash_Log_${{ github.run_id }}
        path: openwrt/build.log

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        if ! ls *img* *ext4 *squashfs* *iso* *gz* 2>/dev/null | grep -q .; then
          echo "❌ 致命错误：编译过程看似成功，但未能在 targets 目录下找到任何固件实体产物！"
          echo "这通常是因为核心包依赖错误导致打包被静默跳过。"
          exit 1
        fi
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=${{ env.DEVICE_NAME }}-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Save ccache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: openwrt/.ccache
        key: ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-${{ github.run_id }}
        
    - name: Save dl
      uses: actions/cache/save@v4
      if: always()
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ github.run_id }}
        
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      continue-on-error: true
      with:
        retain_days: 30
        keep_minimum_runs: 7

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.1.0
      continue-on-error: true
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
